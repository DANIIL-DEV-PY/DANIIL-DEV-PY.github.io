name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vercel pull --yes --environment=production --project daniildev --token="${{ secrets.VERCEL_TOKEN }}"
      - run: npx vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
      - run: npx vercel deploy --prebuilt --prod --yes --project daniildev --token="${{ secrets.VERCEL_TOKEN }}"
